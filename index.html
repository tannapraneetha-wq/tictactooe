<!DOCTYPE html>
<html>
<head>
  <title>Tic-Tac-Toe AI</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
      justify-content: center;
      margin: 20px;
    }

    .cell {
      width: 100px;
      height: 100px;
      font-size: 30px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background: white;
      color: #333;
      transition: 0.3s;
    }

    .cell:hover {
      transform: scale(1.05);
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #eee;
      color: #333;
      transition: 0.3s;
    }

    /* 🔥 ACTIVE GLOW EFFECT */
    button.active {
      background: #ff4e91;
      color: white;
      transform: scale(1.1);
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from {
        box-shadow: 0 0 10px #ff4e91;
      }
      to {
        box-shadow: 0 0 25px #ff4e91, 0 0 50px #ff4e91;
      }
    }

  </style>
</head>

<body>

<h1>🎮 Tic-Tac-Toe AI</h1>

<div id="setup">

  <h2>Select Symbol</h2>
  <button id="btnX" onclick="selectSymbol('X', this)">X</button>
  <button id="btnO" onclick="selectSymbol('O', this)">O</button>

  <h2>Select Difficulty</h2>
  <button onclick="setDifficulty('easy', this)">Easy</button>
  <button onclick="setDifficulty('medium', this)">Medium</button>
  <button onclick="setDifficulty('hard', this)">Hard</button>

  <br><br>
  <button onclick="startGame()">Start Game</button>

</div>

<div id="board" class="board" style="display:none;"></div>

<h2 id="status"></h2>

<button onclick="resetGame()" style="display:none;" id="resetBtn">Play Again</button>

<script>

let board = ["","","","","","","","",""];
let human = "";
let ai = "";
let difficulty = "";
let gameOver = false;

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

const boardDiv = document.getElementById("board");
const statusText = document.getElementById("status");
const setupDiv = document.getElementById("setup");
const resetBtn = document.getElementById("resetBtn");

// SELECT SYMBOL
function selectSymbol(sym, btn) {
  human = sym;
  ai = sym === "X" ? "O" : "X";

  document.getElementById("btnX").classList.remove("active");
  document.getElementById("btnO").classList.remove("active");

  btn.classList.add("active");
}

// SELECT DIFFICULTY
function setDifficulty(level, btn) {
  difficulty = level;

  document.querySelectorAll("#setup button").forEach(b => {
    if (b.innerText === "Easy" || b.innerText === "Medium" || b.innerText === "Hard") {
      b.classList.remove("active");
    }
  });

  btn.classList.add("active");
}

// START GAME
function startGame() {
  if (!human || !difficulty) {
    alert("Please select Symbol and Difficulty!");
    return;
  }

  setupDiv.style.display = "none";
  boardDiv.style.display = "grid";
  resetBtn.style.display = "inline-block";

  createBoard();

  if (ai === "X") {
    setTimeout(aiMove, 300);
  }
}

// CREATE BOARD
function createBoard() {
  boardDiv.innerHTML = "";
  board.forEach((cell, i) => {
    let btn = document.createElement("button");
    btn.innerText = cell;
    btn.classList.add("cell");

    if (gameOver) btn.disabled = true;

    btn.onclick = () => humanMove(i);
    boardDiv.appendChild(btn);
  });
}

// HUMAN MOVE
function humanMove(i) {
  if (board[i] === "" && !gameOver) {
    board[i] = human;
    createBoard();

    if (checkWinner(board, human)) {
      statusText.innerText = "🎉 You Win!";
      gameOver = true;
      return;
    }

    if (isDraw(board)) {
      statusText.innerText = "🤝 Draw!";
      gameOver = true;
      return;
    }

    setTimeout(aiMove, 300);
  }
}

// AI MOVE
function aiMove() {
  let move;

  if (difficulty === "easy") {
    move = randomMove();
  } 
  else if (difficulty === "medium") {
    move = Math.random() < 0.5 ? randomMove() : bestMove();
  } 
  else {
    move = bestMove();
  }

  board[move] = ai;
  createBoard();

  if (checkWinner(board, ai)) {
    statusText.innerText = "🤖 AI Wins!";
    gameOver = true;
    return;
  }

  if (isDraw(board)) {
    statusText.innerText = "🤝 Draw!";
    gameOver = true;
  }
}

// RANDOM MOVE
function randomMove() {
  let empty = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
  return empty[Math.floor(Math.random()*empty.length)];
}

// BEST MOVE (MINIMAX)
function bestMove() {
  let bestScore = -Infinity;
  let move;

  for (let i = 0; i < 9; i++) {
    if (board[i] === "") {
      board[i] = ai;
      let score = minimax(board, 0, false);
      board[i] = "";
      if (score > bestScore) {
        bestScore = score;
        move = i;
      }
    }
  }
  return move;
}

// MINIMAX
function minimax(board, depth, isMax) {
  if (checkWinner(board, ai)) return 10 - depth;
  if (checkWinner(board, human)) return depth - 10;
  if (isDraw(board)) return 0;

  if (isMax) {
    let best = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (board[i] === "") {
        board[i] = ai;
        best = Math.max(best, minimax(board, depth+1, false));
        board[i] = "";
      }
    }
    return best;
  } else {
    let best = Infinity;
    for (let i = 0; i < 9; i++) {
      if (board[i] === "") {
        board[i] = human;
        best = Math.min(best, minimax(board, depth+1, true));
        board[i] = "";
      }
    }
    return best;
  }
}

// CHECK WIN
function checkWinner(b,p) {
  return winPatterns.some(pattern =>
    pattern.every(i => b[i] === p)
  );
}

// CHECK DRAW
function isDraw(b) {
  return b.every(c => c !== "");
}

// RESET
function resetGame() {
  board = ["","","","","","","","",""];
  human = "";
  ai = "";
  difficulty = "";
  gameOver = false;
  statusText.innerText = "";

  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));

  setupDiv.style.display = "block";
  boardDiv.style.display = "none";
  resetBtn.style.display = "none";
}

</script>

</body>
</html>
